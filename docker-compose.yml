version: "3.9"

services:

  db:
    image: postgres:17
    container_name: traderiq-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: TraderIQ

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TraderIQ"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: traderiq-backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      db:
        condition: service_healthy

    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: traderiq-frontend

    ports:
      - "5173:5173"

    env_file:
      - ./frontend/.env

    depends_on:
      - backend

    restart: always

volumes:
  postgres_data: